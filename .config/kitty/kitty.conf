# Inspired by end-4/dots-hyprland, adapted for a zsh-based setup.

font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.0
modify_font cell_height 120%
disable_ligatures never

shell /usr/bin/zsh
shell_integration no-cursor no-title

enable_audio_bell no
visual_bell_duration 0.0
confirm_os_window_close 0
copy_on_select yes
strip_trailing_spaces smart
remember_window_size no
initial_window_width 100c
initial_window_height 28c
placement_strategy center

window_padding_width 14
window_margin_width 0
hide_window_decorations no
background_opacity 0.82
background_blur 1
dynamic_background_opacity yes

cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
cursor_trail 2
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

scrollback_lines 10000
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 5.0

tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"
active_tab_font_style bold
inactive_tab_font_style normal

foreground #cdd6f4
background #11111b
selection_foreground #11111b
selection_background #f5e0dc
cursor #f5e0dc
cursor_text_color #11111b
url_color #89b4fa

active_border_color #89b4fa
inactive_border_color #45475a
bell_border_color #f38ba8

active_tab_foreground #11111b
active_tab_background #89b4fa
inactive_tab_foreground #cdd6f4
inactive_tab_background #1e1e2e

color0 #45475a
color8 #585b70
color1 #f38ba8
color9 #f38ba8
color2 #a6e3a1
color10 #a6e3a1
color3 #f9e2af
color11 #f9e2af
color4 #89b4fa
color12 #89b4fa
color5 #f5c2e7
color13 #f5c2e7
color6 #94e2d5
color14 #94e2d5
color7 #bac2de
color15 #a6adc8

map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_window
map ctrl+shift+f show_scrollback
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0
